name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'tailwind.config.*'
      - 'postcss.config.*'

# Only one deployment at a time
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.chogiare.online

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      # Hashed assets get immutable cache (Vite content-hashes filenames)
      - name: Sync hashed assets to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "favicon.ico" \
            --exclude "robots.txt" \
            --exclude "manifest.json"

      # Non-hashed files must not be cached (change every deploy)
      - name: Sync non-hashed files to S3
        run: |
          for file in index.html favicon.ico robots.txt manifest.json; do
            if [ -f "dist/$file" ]; then
              aws s3 cp "dist/$file" "s3://${{ secrets.AWS_S3_FRONTEND_BUCKET }}/$file" \
                --cache-control "no-cache, no-store, must-revalidate"
            fi
          done

      - name: Report failure
        if: failure()
        run: echo "::error::Frontend deployment FAILED!"
